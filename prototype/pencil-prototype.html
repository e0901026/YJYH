<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>手机借机管理 App - Pencil 原型预览</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fa;
        --ink: #17212b;
        --muted: #697586;
        --line: #d9e1e8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Microsoft YaHei", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      header {
        padding: 28px 32px 12px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }

      main {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 28px;
        padding: 24px 32px 40px;
      }

      figure {
        margin: 0;
      }

      figcaption {
        margin-bottom: 10px;
        font-size: 14px;
        font-weight: 700;
      }

      img {
        display: block;
        width: 100%;
        max-width: 390px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: white;
        box-shadow: 0 14px 36px rgb(23 33 43 / 10%);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>手机借机管理 App - Pencil 原型预览</h1>
      <p>移动端竖屏低保真原型，覆盖登录/注册、首页、扫码借、未建档手机注册、一键还、设备管理、我的与 Owner 后台。</p>
    </header>
    <main>
      <figure>
        <figcaption>01 登录</figcaption>
        <img src="./exports/O7YW4a.png" alt="登录页面" />
      </figure>
      <figure>
        <figcaption>02 注册</figcaption>
        <img src="./exports/cG8CN.png" alt="注册页面" />
      </figure>
      <figure>
        <figcaption>03 首页</figcaption>
        <img src="./exports/ZdqEE.png" alt="首页" />
      </figure>
      <figure>
        <figcaption>04 扫码借 - 识别与确认</figcaption>
        <img src="./exports/n4TX1p.png" alt="扫码借识别与确认页" />
      </figure>
      <figure>
        <figcaption>05 手机注册（未建档）</figcaption>
        <img src="./exports/IFJye.png" alt="未建档手机注册页" />
      </figure>
      <figure>
        <figcaption>06 一键还</figcaption>
        <img src="./exports/CjA4k.png" alt="一键还页面" />
      </figure>
      <figure>
        <figcaption>07 设备列表</figcaption>
        <img src="./exports/ffvfS.png" alt="设备列表页面" />
      </figure>
      <figure>
        <figcaption>08 设备详情</figcaption>
        <img src="./exports/VWchs.png" alt="设备详情页面" />
      </figure>
      <figure>
        <figcaption>09 我的</figcaption>
        <img src="./exports/wPn6S.png" alt="我的页面" />
      </figure>
      <figure>
        <figcaption>10 Owner - 用户列表</figcaption>
        <img src="./exports/kIEPr.png" alt="Owner 用户列表页面" />
      </figure>
      <figure>
        <figcaption>11 Owner - 邀请码</figcaption>
        <img src="./exports/U4SUwg.png" alt="Owner 邀请码页面" />
      </figure>
    </main>
  </body>
</html>
